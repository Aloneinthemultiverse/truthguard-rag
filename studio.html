<!doctype html><html><head><meta charset="utf-8"><title>TruthGuard Studio</title>
<style>
*{box-sizing:border-box;margin:0}
body{background:#05070f;color:#c9d1d9;font-family:system-ui;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:10px 16px;border-bottom:1px solid #1c2333;display:flex;align-items:center;gap:12px}
header b{color:#fff}
#stats{font-size:12px;color:#39d2c0;margin-left:auto}
main{flex:1;display:grid;grid-template-columns:1.2fr 1fr;min-height:0}
#chatcol{display:flex;flex-direction:column;border-right:1px solid #1c2333;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.q{align-self:flex-end;background:#1f2a44;border-radius:12px 12px 2px 12px;padding:8px 14px;max-width:80%}
.a{align-self:flex-start;background:#0d1117;border:1px solid #1c2333;border-radius:12px 12px 12px 2px;padding:10px 14px;max-width:92%;font-size:14px;line-height:1.5}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{font-size:11px;padding:2px 9px;border-radius:10px;background:#0f3d33;color:#39d2c0}
.chip.warn{background:#3d2f0f;color:#e3b341}
.chip.kind{background:#2a1f44;color:#bc8cff}
.conf{height:5px;border-radius:3px;background:#1c2333;margin:8px 0 3px;overflow:hidden}
.conf i{display:block;height:100%}
.cite{font-size:11px;color:#8b949e;margin-top:6px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.dual div{border:1px solid #1c2333;border-radius:8px;padding:8px;font-size:13px}
#drop{margin:0 16px 10px;border:1px dashed #30363d;border-radius:10px;padding:8px;text-align:center;font-size:12px;color:#8b949e}
#drop.over{border-color:#39d2c0;color:#39d2c0}
#bar{display:flex;gap:8px;padding:0 16px 14px}
#qin{flex:1;background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;padding:10px 14px;font-size:14px}
#send{background:#1d9e75;border:0;border-radius:10px;color:#04120d;font-weight:600;padding:0 18px;cursor:pointer}
#graphcol{display:flex;flex-direction:column;min-width:0}
#gframe{flex:1;border:0;width:100%}
#gbar{padding:8px 14px;font-size:12px;color:#8b949e;border-top:1px solid #1c2333}
.spin{opacity:.6;font-style:italic}
</style></head><body>
<header><b>TruthGuard Studio</b><span style="font-size:12px;color:#8b949e">self-correcting RAG · 3-plane memory</span><span id="stats"></span></header>
<main>
<div id="chatcol">
  <div id="msgs"></div>
  <div id="drop">drop a PDF / DOCX / MD here to ingest — the graph grows live</div>
  <div id="bar"><input id="qin" placeholder="Ask about your documents, code, or past chats" onkeydown="if(event.key==='Enter')send()"><button id="send" onclick="send()">Ask</button></div>
</div>
<div id="graphcol">
  <iframe id="gframe" src="http://127.0.0.1:7787/FULL_3plane_clean.html"></iframe>
  <div id="gbar">live 3-plane graph — grows with every answer</div>
</div>
</main>
<script>
const API='http://127.0.0.1:7788';
const msgs=document.getElementById('msgs');
async function stats(){try{const s=await(await fetch(API+'/stats')).json();
 document.getElementById('stats').textContent=`${s.nodes} nodes · ${s.edges} edges · ${s.turns} turns`;}catch(e){}}
stats();setInterval(stats,6000);
function el(cls,html){const d=document.createElement('div');d.className=cls;d.innerHTML=html;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d}
function esc(t){return (t||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}
let pendingFollowup=null;
async function send(followup){
 const qin=document.getElementById('qin');
 const q=followup||qin.value.trim(); if(!q)return; qin.value='';
 el('q',esc(q));
 const wait=el('a spin','thinking — retrieve → assess → …');
 try{
  const body={question:pendingFollowup?pendingFollowup.q:q};
  if(pendingFollowup){body.followup=q;pendingFollowup=null}
  const r=await(await fetch(API+'/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
  wait.remove(); render(r,q);
 }catch(e){wait.textContent='Request failed ('+e.message+') — API running? uvicorn truthguard.api:app --port 7788'}
}
function render(r,q){
 const chips=(r.trace||[]).map(s=>{
  const t=s.step; const cls=/clash|contradic|insufficient|refus/.test(t)?'chip warn':'chip';
  return `<span class="${cls}">${esc(t)}</span>`}).join('')
  +`<span class="chip kind">${esc(r.kind)}</span>`;
 let body=esc(r.text).replace(/\n/g,'<br>');
 let extra='';
 if(r.kind==='clarify'){pendingFollowup={q};}
 if(r.confidence!=null){
  const c=r.confidence,col=c>=0.75?'#1d9e75':(c>=0.4?'#e3b341':'#e24b4a');
  extra+=`<div class="conf"><i style="width:${Math.round(c*100)}%;background:${col}"></i></div>
  <div class="cite">confidence ${c} · ${esc(r.band||'')}</div>`}
 if(r.citations&&r.citations.length)extra+=`<div class="cite">sources: ${r.citations.map(esc).join(' | ')}</div>`;
 el('a',`<div class="chips">${chips}</div>${body}${extra}`);
}
const drop=document.getElementById('drop');
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=async e=>{e.preventDefault();drop.classList.remove('over');
 const f=e.dataTransfer.files[0]; if(!f)return;
 drop.textContent=`ingesting ${f.name} …`;
 const fd=new FormData(); fd.append('file',f);
 try{const r=await(await fetch(API+'/ingest/document',{method:'POST',body:fd})).json();
  drop.textContent=`ingested ${r.file} — corpus now ${r.total_chunks} chunks (${r.engine})`;stats();
 }catch(err){drop.textContent='ingest failed — is the API running?'}};
</script></body></html>
